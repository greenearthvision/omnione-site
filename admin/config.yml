backend:
  name: git-gateway
  branch: main

# Use Netlify Identity for login
media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:

      - name: "home"
        label: "Home Page"
        file: "index.html"
        fields:
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
          - label: "Hero Tagline"
            name: "hero_tagline"
            widget: "string"
          - label: "About OmniOne (intro text)"
            name: "about_intro"
            widget: "text"

      - name: "about"
        label: "About Page"
        file: "about.html"
        fields:
          - label: "Page Title"
            name: "title"
            widget: "string"
          - label: "Main Content"
            name: "body"
            widget: "markdown"

      - name: "evidence"
        label: "Evidence & Impact"
        file: "evidence.html"
        fields:
          - label: "Page Title"
            name: "title"
            widget: "string"
          - label: "Main Content"
            name: "body"
            widget: "markdown"

      - name: "get-involved"
        label: "Get Involved"
        file: "get-involved.html"
        fields:
          - label: "Page Title"
            name: "title"
            widget: "string"
          - label: "Main Content"
            name: "body"
            widget: "markdown"

      - name: "services"
        label: "Services"
        file: "services.html"
        fields:
          - label: "Page Title"
            name: "title"
            widget: "string"
          - label: "Main Content"
            name: "body"
            widget: "markdown"

      - name: "faq"
        label: "FAQ Videos"
        file: "faq.html"
        fields:
          - label: "Page Title"
            name: "title"
            widget: "string"
          - label: "Intro Text"
            name: "intro"
            widget: "text"
